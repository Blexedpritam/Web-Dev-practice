<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Transformm</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body{
            height: 100%;
            width: 100%;
        }
        .container{
            background-color: antiquewhite;
            padding: 5rem;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1rem;

        }
        .items{
            padding: 2rem;
            height: 150px;
            width: 150px;
            background-color:   rgb(54, 54, 180);
            border: 2px solid  black;

        }
        #rotateX:hover{
            transform: rotatex(45deg);
        }
        #rotateY:hover{
            transform:  rotateY(-45deg);
        }
        #rotateZ:hover{
            transform:  rotateZ(45deg);
        }
        #translateX:hover{
            transform: translateX(-100px);
        }
        #translateY:hover{
            transform: translateY(-100px);
        }
        #translateZ:hover{
            transform: perspective(300px) translateZ(100px);
        }
        #scaleX:hover{
            transform:skewX(30deg);
        }
        #scaleY:hover{
            transform: scaleY(1.5);
        } 
        
        #scaleZ:hover{
            transform: perspective(300px) scaleZ(1.5) rotateX(30deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items" id="rotateX">RotateX</div>
        <div class="items" id="rotateY">RotateY</div>
        <div class="items" id="rotateZ">rotateZ</div>
        <div class="items" id="translateX">TranslateX</div>
        <div class="items" id="translateY">TranslateY</div>
        <div class="items" id="translateZ">TranslateZ</div>
        <div class="items" id="scaleX">ScaleX</div>
        <div class="items" id="scaleY">ScaleY</div>
        <div class="items" id="scaleZ">ScaleZ</div>
    </div>
</body>
</html>
